limit_req_zone $binary_remote_addr zone=his_agent_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=his_agent_diart:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=his_agent_websocket:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name 8-210-44-40.sslip.io 8.210.44.40 _;
    root /opt/his-agent;
    index index.html;

    client_max_body_size 8m;
    limit_req_status 429;
    limit_conn_status 429;

    location /api/ {
        limit_req zone=his_agent_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location /diarization/ {
        limit_req zone=his_agent_diart burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location = /ws/diarization {
        limit_conn his_agent_websocket 4;
        proxy_pass http://127.0.0.1:8000/ws/diarization;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8010/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location = /ws {
        limit_conn his_agent_websocket 4;
        proxy_pass http://127.0.0.1:8010/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    location ^~ /html/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    location ^~ /shared/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }

    location = /favicon.ico {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        return 404;
    }
}
